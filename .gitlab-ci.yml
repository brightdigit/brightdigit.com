stages:
  - automate-content
  - build
  - package
  - deploy
  - test

include:
  - template: Code-Quality.gitlab-ci.yml

cache:
  key: 
    files:
      - Package.resolved
      - ~/.swiftpm
  paths:
    - .build/

variables:
  main_branch: 'main'
  automate_content_commit: '/^automate-content/i'
  excluded_branches: '/(styling\/.*$)|(.*WIP$)/i'
  merge_request_draft:  '/^(\[Draft\]|\(Draft\)|Draft:)/'
  merge_request_pipeline_source: 'merge_request_event'


###############
#### Rules ####
###############

.build_rules:
  rules:
    # To run manually for draft merge request.
    - if: $AUTOMATE_CONTENT == null && ($CI_PIPELINE_SOURCE == $merge_request_pipeline_source && $CI_MERGE_REQUEST_TITLE =~ $merge_request_draft)
      when: manual
    
    # To run only if any swift file changed.
    - if: $AUTOMATE_CONTENT == null && ('$CI_COMMIT_BRANCH !~ $excluded_branches')
      changes:
        - "**/*.swift"
    
    # To never run brightdigitwg executable is available
    - if: $AUTOMATE_CONTENT == null && ('$CI_COMMIT_BRANCH !~ $excluded_branches')
      exists:
        - brightdigitwg-*
      when: never

.package_jammy_rules:
  rules:
    # To run only on main branch commits if any swift file changes.
    - if: $AUTOMATE_CONTENT == null && ($CI_COMMIT_BRANCH == $main_branch)
      changes:
        - "**/*.swift"

    # To never run on main branch commits if executable is available.
    - if: $AUTOMATE_CONTENT == null && ($CI_COMMIT_BRANCH == $main_branch)
      exists:
        - brightdigitwg-*
      when: never

.deploy_rules:
  rules:
    # To run manually if merge request is of type Draft.
    - if: $AUTOMATE_CONTENT == null && ($CI_PIPELINE_SOURCE == $merge_request_pipeline_source && $CI_MERGE_REQUEST_TITLE =~ $merge_request_draft)
      when: manual
    - if: $AUTOMATE_CONTENT == null


##############
#### JOBS ####
##############

automate content:
  rules:
    - if: $AUTOMATE_CONTENT != null
  stage: automate-content
  resource_group: automate-content
  variables:
    GIT_STRATEGY: clone
  tags:
    - macos
  before_script:
    - git remote set-url origin git@gitlab.com:BrightDigit/Public/brightdigit.com.git
    - git checkout $CI_COMMIT_BRANCH
  script:
    # Run import commands (mailchimp, podcast, etc..)
    - |- 
      if [[ -z "$DONOT_SKIP_BUILD" ]]
      then
        echo "Build will be skipped"
        SKIP_BUILD_OPTION="--skip-build"

      else
        echo "Build will NOT be skipped"
        SKIP_BUILD_OPTION=""
      fi
    - swift run $SKIP_BUILD_OPTION brightdigitwg 
      import mailchimp 
        --mailchimp-api-key=$MAILCHIMP_API_KEY 
        --mailchimp-list-id=$MAILCHIMP_LIST_ID 
        --export-markdown-directory=Content/newsletters
    - swift run $SKIP_BUILD_OPTION brightdigitwg 
      import podcast 
        --youtube-api-key=$YOUTUBE_API_KEY 
        --export-markdown-directory Content/episodes

    - echo "Current git status (porcelain):"
    - git status --porcelain

    # Commit any changes (new newsletters, podcasts, etc..) if found
    # - CHANGES_COUNT=`git status --porcelain | wc -l`
    # - |-
    #   if [[ $CHANGES_COUNT -ne 0 ]]; then
    #     TODAY_DATE=`date '+%y%m%d%H%M'`
    #     COMMIT_MESSAGE="Bot:- ${TODAY_DATE} - ${CHANGES_COUNT} new changes"
    #     git add .
    #     git commit -m "${COMMIT_MESSAGE}"
    #     git push origin $CI_COMMIT_BRANCH
    #   fi

build jammy:
  rules:
    - !reference [.build_rules, rules]
  stage: build
  resource_group: $CI_COMMIT_REF_NAME
  image: brightdigit/publish-xml
  script:
    - export ARCH_PREFIX=$(uname -i)
    - swift build
    - swift test

build macos:
  rules:
    - !reference [.build_rules, rules]
  stage: build
  resource_group: $CI_COMMIT_REF_NAME
  tags:
    - macos
  script:
    - swift build    
    #- swift run swiftformat --lint .
    #- swift run swiftlint
    - swift test

package macos:
  rules:
    - !reference [.build_rules, rules]
  stage: package
  resource_group: $CI_COMMIT_REF_NAME
  tags:
    - macos
  artifacts:
    paths:
      - brightdigitwg-*
  script:
    - swift build -c release --product brightdigitwg
    - BIN_PATH=`swift build -c release --product brightdigitwg --show-bin-path`
    - cp $BIN_PATH/brightdigitwg brightdigitwg-`uname`-`arch`

package jammy:
  timeout: 3h
  rules:
    - !reference [.package_jammy_rules, rules]
  stage: package
  resource_group: $CI_COMMIT_REF_NAME
  image: brightdigit/publish-xml
  artifacts:
    paths:
      - brightdigitwg-*
  script:
    - swift build -c release --product brightdigitwg
    - BIN_PATH=`swift build -c release --product brightdigitwg --show-bin-path`
    - cp $BIN_PATH/brightdigitwg brightdigitwg-`uname`-`arch`

deploy:
  rules:
    - !reference [.deploy_rules, rules]
  stage: deploy
  resource_group: $CI_COMMIT_REF_NAME
  tags:
    - macos  
  artifacts:
    paths:
      - brightdigitwg-*
  script:
    - if [ "$CI_COMMIT_REF_NAME" = "main" ]; then PUBLISHING_MODE=production; else PUBLISHING_MODE=drafts; fi
    - if [ "$CI_COMMIT_REF_NAME" = "main" ]; then PROD_FLAG="--prod"; else PROD_FLAG=""; fi   
    - BIN_PATH=`swift build -c release --product brightdigitwg --show-bin-path`
    - cp $BIN_PATH/brightdigitwg brightdigitwg-`uname`-`arch`
    - ./brightdigitwg-`uname`-`arch` --mode $PUBLISHING_MODE
    - netlify deploy --site $NETLIFY_PRODUCTION_SITE_ID --auth $NETLIFY_AUTH_TOKEN $PROD_FLAG

code_quality:
  cache: []
  stage: test
  resource_group: $CI_COMMIT_REF_NAME
  rules:
    - !reference [.build_rules, rules]
  artifacts:
    paths: [gl-code-quality-report.json]
