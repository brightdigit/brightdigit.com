name: Cache Dependencies Action

runs:
  using: "composite"
  steps:
    - name: Cache SwiftPM Dependencies
      uses: actions/cache@v3
      with:
        path: |
          .build/
          ~/.swiftpm
        key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-swiftpm-